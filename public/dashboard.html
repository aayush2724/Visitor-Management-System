<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSB | Command Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0d12; --bg-panel: #0d1117; --bg-card: #111820;
      --border: #1a2a1a; --green: #00ff88; --green-dim: #00cc66;
      --green-glow: rgba(0,255,136,0.2); --green-dark: rgba(0,255,136,0.07);
      --text: #e0ffe8; --text-muted: #5a7a6a; --text-label: #00cc66;
      --red: #ff4444; --amber: #f59e0b; --blue: #4facfe; --purple: #a78bfa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); font-family: 'Rajdhani', sans-serif;
      color: var(--text); min-height: 100vh;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.012) 2px, rgba(0,255,136,0.012) 4px);
      z-index: 9999;
    }

    /* NAV */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 64px;
      background: rgba(10,13,18,0.95); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; }
    .shield {
      width: 32px; height: 32px; border: 2px solid var(--green); border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--green); box-shadow: 0 0 10px var(--green-glow);
    }
    .logo-text { font-family: 'Orbitron', monospace; font-size: 0.95rem; font-weight: 600; letter-spacing: 2px; }
    .logo-sub { font-family: 'Share Tech Mono', monospace; font-size: 0.6rem; color: var(--text-muted); letter-spacing: 4px; display: block; margin-top: -4px; }
    .nav-links { display: flex; gap: 8px; align-items: center; }
    .nav-btn { padding: 8px 20px; border-radius: 4px; font-family: 'Rajdhani', sans-serif; font-size: 0.9rem; font-weight: 600; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; text-decoration: none; border: 1px solid #1e2e2e; background: transparent; color: var(--text-muted); }
    .nav-btn:hover { color: var(--green); border-color: var(--green); }
    .nav-btn-active { background: var(--green); color: #000; border-color: var(--green); box-shadow: 0 0 16px var(--green-glow); }
    .logout-btn { background: transparent; border: 1px solid #2a1a1a; color: #ff6666; font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; letter-spacing: 2px; padding: 8px 14px; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
    .logout-btn:hover { background: rgba(255,68,68,0.1); border-color: var(--red); }

    /* CONTENT */
    .content { padding: 32px 40px; max-width: 1600px; margin: 0 auto; }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
    .stat-card {
      background: var(--bg-panel); border: 1px solid var(--border); border-radius: 6px;
      padding: 24px; position: relative; overflow: hidden; transition: all 0.2s;
    }
    .stat-card:hover { border-color: var(--green); box-shadow: 0 0 20px rgba(0,255,136,0.08); transform: translateY(-2px); }
    .stat-label { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; color: var(--text-muted); letter-spacing: 3px; margin-bottom: 12px; }
    .stat-value { font-family: 'Orbitron', monospace; font-size: 2rem; font-weight: 800; color: var(--green); }
    .stat-accent { position: absolute; top: 0; right: 0; width: 3px; height: 100%; }

    /* TOOLBAR */
    .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 360px; }
    .search-wrap input {
      width: 100%; background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: 4px; padding: 10px 14px 10px 36px;
      color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 0.8rem;
      outline: none; transition: all 0.2s; letter-spacing: 1px;
    }
    .search-wrap input:focus { border-color: var(--green); box-shadow: 0 0 10px rgba(0,255,136,0.05); }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.8rem; }
    
    .export-btn {
      padding: 10px 18px; background: transparent; border: 1px solid #1a2a2a;
      color: var(--green-dim); font-family: 'Rajdhani', sans-serif; font-size: 0.85rem;
      font-weight: 600; border-radius: 4px; cursor: pointer; transition: all 0.2s; letter-spacing: 1px;
    }
    .export-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-dark); }

    /* TABS */
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; overflow-x: auto; }
    .tab {
      padding: 8px 18px; border-radius: 4px; font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem; letter-spacing: 2px; color: var(--text-muted);
      cursor: pointer; transition: all 0.2s; border: 1px solid transparent; white-space: nowrap;
    }
    .tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .tab.active { color: var(--green); background: var(--green-dark); border-color: rgba(0,255,136,0.2); }

    /* TABLE */
    .table-wrap { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 6px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 14px 16px; text-align: left;
      font-family: 'Share Tech Mono', monospace; font-size: 0.62rem;
      letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }
    tbody td { padding: 14px 16px; font-size: 0.95rem; border-bottom: 1px solid rgba(26,42,26,0.5); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(0,255,136,0.02); }

    /* VISITOR NAME + PHOTO */
    .vis-name { display: flex; align-items: center; gap: 10px; }
    .vis-thumb {
      width: 36px; height: 36px; border-radius: 4px; object-fit: cover;
      border: 1px solid var(--border); background: #1a2a1a; flex-shrink: 0;
    }
    .vis-thumb-placeholder {
      width: 36px; height: 36px; border-radius: 4px; background: #1a2a1a;
      border: 1px solid var(--border); display: flex; align-items: center;
      justify-content: center; font-size: 0.7rem; color: var(--text-muted); flex-shrink: 0;
    }
    .vis-name-text { font-weight: 600; }
    .vis-id { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; color: var(--text-muted); margin-top: 2px; }

    /* BADGES */
    .badge { padding: 4px 10px; border-radius: 3px; font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; letter-spacing: 1px; }
    .badge-active    { background: rgba(0,255,136,0.1);  color: var(--green); }
    .badge-released  { background: rgba(79,172,254,0.1); color: var(--blue); }
    .badge-pending   { background: rgba(245,158,11,0.1); color: var(--amber); }
    .badge-scheduled { background: rgba(167,139,250,0.1); color: var(--purple); }

    /* ACTION BUTTONS */
    .act-btn {
      padding: 6px 12px; border-radius: 3px; font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem; letter-spacing: 1px; cursor: pointer; border: 1px solid;
      transition: all 0.15s; background: transparent;
    }
    .act-checkout { border-color: rgba(0,255,136,0.3); color: var(--green); }
    .act-checkout:hover { background: rgba(0,255,136,0.1); }
    .act-release { border-color: rgba(79,172,254,0.3); color: var(--blue); }
    .act-release:hover { background: rgba(79,172,254,0.1); }
    .act-security { border-color: rgba(245,158,11,0.3); color: var(--amber); }
    .act-security:hover { background: rgba(245,158,11,0.1); }
    .act-allow { border-color: rgba(167,139,250,0.3); color: var(--purple); }
    .act-allow:hover { background: rgba(167,139,250,0.1); }
    .act-delete { border-color: rgba(255,68,68,0.2); color: #ff6666; margin-left: 4px; }
    .act-delete:hover { background: rgba(255,68,68,0.1); border-color: var(--red); }

    .actions-cell { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }

    .empty-row td { text-align: center; color: var(--text-muted); padding: 40px; font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; letter-spacing: 2px; }

    /* --- NEW ANIMATIONS & INTERACTIVE EFFECTS --- */
    @keyframes fadeInSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseGlow { 0% { box-shadow: 0 0 10px rgba(0,255,136,0.1); } 100% { box-shadow: 0 0 25px rgba(0,255,136,0.25); } }
    
    .nav-brand { transition: transform 0.3s; }
    .nav-brand:hover { transform: scale(1.02); }
    .nav-btn, .export-btn, .tab { position: relative; overflow: hidden; }
    .nav-btn::after, .export-btn::after, .tab::after {
      content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transform: translateX(-100%); transition: transform 0.4s ease;
    }
    .nav-btn:hover::after, .export-btn:hover::after, .tab:hover::after { transform: translateX(100%); }
    
    .stat-card.pulsing:hover { animation: pulseGlow 1.5s infinite alternate; }
    
    tbody tr { animation: fadeInSlide 0.4s ease forwards; opacity: 0; }
    tbody tr:nth-child(1) { animation-delay: 0.05s; }
    tbody tr:nth-child(2) { animation-delay: 0.1s; }
    tbody tr:nth-child(3) { animation-delay: 0.15s; }
    tbody tr:nth-child(4) { animation-delay: 0.2s; }
    tbody tr:nth-child(5) { animation-delay: 0.25s; }
    tbody tr:hover { transform: scale(1.005); transition: transform 0.2s, background 0.2s; background: rgba(0,255,136,0.03); z-index: 10; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

    @media (max-width: 900px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .content { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-brand">
      <div class="shield">&#9873;</div>
      <div>
        <span class="logo-text">RSB | SECURE</span>
        <span class="logo-sub">COMMAND CENTER</span>
      </div>
    </div>
    <div class="nav-links">
      <a href="/" class="nav-btn">&#10022; Register</a>
      <a href="/schedule.html" class="nav-btn">&#9776; Schedule</a>
      <a href="/dashboard.html" class="nav-btn nav-btn-active">&#9685; Dashboard</a>
      <button class="logout-btn" onclick="logout()">EXIT &#9670;</button>
    </div>
  </nav>

  <div class="content">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card pulsing">
        <div class="stat-label">TOTAL REGISTRY</div>
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-accent" style="background:var(--green);opacity:0.4;"></div>
      </div>
      <div class="stat-card pulsing">
        <div class="stat-label">ON-SITE NOW</div>
        <div class="stat-value" id="stat-active">0</div>
        <div class="stat-accent" style="background:var(--green);"></div>
      </div>
      <div class="stat-card pulsing">
        <div class="stat-label">TOTAL RELEASED</div>
        <div class="stat-value" id="stat-released" style="color:var(--blue)">0</div>
        <div class="stat-accent" style="background:var(--blue);"></div>
      </div>
      <div class="stat-card pulsing">
        <div class="stat-label">PRE-SCHEDULED</div>
        <div class="stat-value" id="stat-scheduled" style="color:var(--purple)">0</div>
        <div class="stat-accent" style="background:var(--purple);"></div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">&#9906;</span>
        <input type="text" id="search-input" placeholder="SEARCH VISITOR NAME...">
      </div>
      <button class="export-btn" onclick="downloadExcel('day')">&#8659; Daily Log</button>
      <button class="export-btn" onclick="downloadExcel('week')">&#8659; Weekly</button>
      <button class="export-btn" onclick="downloadExcel('month')">&#8659; Monthly</button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" data-status="all">ALL RECORDS</div>
      <div class="tab" data-status="active">ON-SITE</div>
      <div class="tab" data-status="released">COMPLETED</div>
      <div class="tab" data-status="security-pending">PENDING EXIT</div>
      <div class="tab" data-status="scheduled">SCHEDULED</div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Visitor</th>
            <th>Contact</th>
            <th>Dept / Host</th>
            <th>Timeline</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="visitor-tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    // — Secure Auth Guard —
    const token = sessionStorage.getItem('rsb_auth');
    if (token !== 'rsb-admin-auth-token-xyz') {
      window.location.href = '/login.html';
    }

    function logout() {
      sessionStorage.removeItem('rsb_auth');
      window.location.href = '/login.html';
    }

    let currentStatus = 'all';
    let allVisitors = [];
    let searchTerm = '';

    // SSE for live updates
    const es = new EventSource('/api/visitors/updates');
    es.onmessage = () => { loadStats(); loadVisitors(); };

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentStatus = tab.dataset.status;
        loadVisitors();
      });
    });

    // Search
    document.getElementById('search-input').addEventListener('input', e => {
      searchTerm = e.target.value.trim().toLowerCase();
      renderTable();
    });

    function loadStats() {
      fetch('/api/visitors/stats').then(r => r.json()).then(s => {
        document.getElementById('stat-total').textContent    = s.total    || 0;
        document.getElementById('stat-active').textContent   = s.active   || 0;
        document.getElementById('stat-released').textContent = s.released || 0;
        document.getElementById('stat-scheduled').textContent = s.scheduled || 0;
      }).catch(console.error);
    }

    function loadVisitors() {
      const url = currentStatus === 'all' ? '/api/visitors' : `/api/visitors?status=${currentStatus}`;
      fetch(url).then(r => {
        if (!r.ok) throw new Error('Server error');
        return r.json();
      }).then(visitors => {
        allVisitors = visitors;
        renderTable();
      }).catch(err => {
        document.getElementById('visitor-tbody').innerHTML =
          `<tr class="empty-row"><td colspan="6">[ ERROR: ${err.message} ]</td></tr>`;
      });
    }

    function renderTable() {
      const tbody = document.getElementById('visitor-tbody');
      const filtered = searchTerm
        ? allVisitors.filter(v => v.full_name.toLowerCase().includes(searchTerm))
        : allVisitors;

      if (!filtered.length) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="6">[ NO RECORDS FOUND ]</td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(v => {
        // Badge
        let badge;
        if (v.scheduled)            badge = `<span class="badge badge-scheduled">SCHEDULED</span>`;
        else if (v.security_confirmed) badge = `<span class="badge badge-released">CHECKED OUT</span>`;
        else if (v.out_time)        badge = `<span class="badge badge-pending">EXIT PENDING</span>`;
        else                        badge = `<span class="badge badge-active">ON-SITE</span>`;

        // Action buttons
        let actions = '';
        if (v.scheduled)
          actions += `<button class="act-btn act-allow" data-id="${v.id}" onclick="allowEntry('${v.id}')">ALLOW IN</button>`;
        else if (!v.out_time && v.approved)
          actions += `<button class="act-btn act-release" onclick="releaseVisitor('${v.id}')">RELEASE</button>`;
        else if (!v.out_time)
          actions += `<button class="act-btn act-checkout" onclick="checkoutVisitor('${v.id}')">CHECK OUT</button>`;
        else if (!v.security_confirmed)
          actions += `<button class="act-btn act-security" onclick="securityCheckout('${v.id}')">CONFIRM EXIT</button>`;
        actions += `<button class="act-btn act-delete" onclick="deleteVisitor('${v.id}', this)">&#10005;</button>`;

        // Photo
        const photoEl = v.photo_path
          ? `<img src="${v.photo_path}" class="vis-thumb" alt="photo">`
          : `<div class="vis-thumb-placeholder">N/A</div>`;

        // Times
        const inT  = new Date(v.in_time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        const outT = v.out_time ? new Date(v.out_time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--:--';
        const dateStr = new Date(v.in_time).toLocaleDateString();

        return `<tr>
          <td>
            <div class="vis-name">
              ${photoEl}
              <div>
                <div class="vis-name-text">${v.full_name}</div>
                <div class="vis-id">${dateStr} · #${v.id.slice(-6)}</div>
              </div>
            </div>
          </td>
          <td><span style="font-family:'Share Tech Mono',monospace;font-size:0.85rem;">${v.contact_number}</span></td>
          <td>
            <div>${v.department_visiting}</div>
            <div style="font-size:0.8rem;color:var(--text-muted)">&#8594; ${v.person_to_visit}</div>
          </td>
          <td>
            <div style="font-family:'Share Tech Mono',monospace;font-size:0.75rem;color:var(--green)">IN&nbsp; ${inT}</div>
            <div style="font-family:'Share Tech Mono',monospace;font-size:0.75rem;color:var(--text-muted)">OUT ${outT}</div>
          </td>
          <td>${badge}</td>
          <td><div class="actions-cell">${actions}</div></td>
        </tr>`;
      }).join('');
    }

    function checkoutVisitor(id) {
      if (!confirm('Mark this visitor as checked out?')) return;
      fetch(`/api/visitors/${id}/checkout`, {method:'POST'})
        .then(r => { if(!r.ok) throw new Error(); loadVisitors(); loadStats(); })
        .catch(() => alert('Checkout failed'));
    }

    function releaseVisitor(id) {
      if (!confirm('Release this visitor?')) return;
      fetch(`/api/visitors/${id}/release`, {method:'POST'})
        .then(r => { if(!r.ok) throw new Error(); loadVisitors(); loadStats(); })
        .catch(() => alert('Release failed'));
    }

    function securityCheckout(id) {
      if (!confirm('Confirm security exit?')) return;
      fetch(`/api/visitors/${id}/security-checkout`, {method:'POST'})
        .then(r => { if(!r.ok) throw new Error(); loadVisitors(); loadStats(); })
        .catch(() => alert('Security checkout failed'));
    }

    function allowEntry(id) {
      fetch(`/api/visitors/${id}/allow-entry`, {method:'POST'})
        .then(r => { if(!r.ok) throw new Error(); loadVisitors(); loadStats(); })
        .catch(() => alert('Allow entry failed'));
    }

    function deleteVisitor(id, btn) {
      if (!confirm('Permanently delete this visitor record?')) return;
      const row = btn.closest('tr');
      row.style.opacity = '0.4';
      fetch(`/api/visitors/${id}`, {method:'DELETE'})
        .then(r => { if(!r.ok) throw new Error(); loadVisitors(); loadStats(); })
        .catch(() => { alert('Delete failed'); row.style.opacity = '1'; });
    }

    function downloadExcel(period) {
      fetch(`/api/visitors/export?period=${period}`)
        .then(r => r.blob())
        .then(blob => {
          const link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          link.download = `RSB_VisitorLOG_${period.toUpperCase()}_${new Date().toISOString().split('T')[0]}.xlsx`;
          link.click();
        }).catch(err => alert('Export Error: ' + err.message));
    }

    loadStats();
    loadVisitors();
  </script>
</body>
</html>

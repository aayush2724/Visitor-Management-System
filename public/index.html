<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSB | Visitor Management</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div class="container">
    <header>
      <h1>Visitor Registration</h1>
    </header>
    
    <nav>
      <a href="/dashboard.html">
        <i data-lucide="layout-dashboard"></i>
        Access Admin Dashboard
      </a>
    </nav>
    
    <main>
      <section class="form-section card">
        <div class="camera-container">
          <h2>Identity Capture</h2>
          <video id="video" autoplay playsinline></video>
          <button id="capture-btn" class="btn">
            <i data-lucide="camera"></i> Capture Identity
          </button>
          <canvas id="canvas" aria-hidden="true"></canvas>
        </div>
        
        <div>
          <h2>Registration Details</h2>
          <form id="visitor-form" class="visitor-form">
            <div class="form-group">
              <label for="full_name">Full Name</label>
              <input type="text" id="full_name" placeholder="John Doe" required>
            </div>
            
            <div class="form-group">
              <label for="contact_number">Contact Number</label>
              <input type="tel" id="contact_number" placeholder="10-digit mobile" required pattern="[0-9]{10}">
            </div>
            
            <div class="form-group">
              <label for="department_visiting">Department Visiting</label>
              <select id="department_visiting" required>
                <option value="">Select Department</option>
                <option value="HR">Human Resources</option>
                <option value="IT">ITMS</option>
                <option value="Finance">Finance</option>
                <option value="Production">Production</option>
                <option value="Quality">Quality</option>
                <option value="Purchase">Purchase</option>
                <option value="Engineering">Engineering & Development</option>
                <option value="Business">Business Development</option>
                <option value="Sales">Sales</option>
              </select>
            </div>
            
            <div class="form-group">
              <label for="person_to_visit">Host / Person to Visit</label>
              <input type="text" id="person_to_visit" placeholder="Name of the person" required>
            </div>
            
            <input type="hidden" id="photo-data">
            
            <button type="submit" class="btn btn-primary">
              <i data-lucide="user-plus"></i> Register Visitor
            </button>
          </form>
        </div>
      </section>
      
      <section id="visitor-badge" class="visitor-badge hidden" aria-live="polite">
        <h2>Visitor Pass</h2>
        <img id="badge-photo" src="" alt="Visitor Photo">
        <div class="badge-info">
          <p><strong>Name</strong> <span id="badge-name"></span></p>
          <p><strong>Contact</strong> <span id="badge-contact"></span></p>
          <p><strong>Visiting</strong> <span id="badge-department"></span></p>
          <p><strong>Host</strong> <span id="badge-host"></span></p>
          <p><strong>Check-in</strong> <span id="badge-time"></span></p>
        </div>
        <button id="print-btn" class="btn btn-primary">
          <i data-lucide="printer"></i> Print Pass
        </button>
      </section>
    </main>
  </div>
  
  <script src="script.js" defer></script>
  <script>
    // Initialize Lucide icons
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
    });
  </script>
</body>
</html>

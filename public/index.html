<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSB | Visitor Management</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="container">
    <nav>
      <a href="/dashboard.html">Admin Access</a>
      <a href="/schedule.html">Schedule Visit</a>
      <a href="#" class="btn btn-outline" style="border-radius: 40px; padding: 8px 20px;">Support</a>
    </nav>

    <header>
      <h1>Identity-driven security for the modern workplace.</h1>
      <p>Streamline your visitor check-in process with our enterprise-grade biometric registration system.</p>
    </header>

    <main>
      <section class="form-section">
        <div class="card">
          <h2>Capture Identity</h2>
          <div class="camera-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
          </div>
          <button id="capture-btn" class="btn btn-primary" style="width: 100%;">
            <i data-lucide="camera"></i> Initialize Camera
          </button>
        </div>

        <div class="card">
          <h2>Registration Details</h2>
          <form id="visitor-form" class="visitor-form">
            <div class="form-group">
              <label for="full_name">Full Name</label>
              <input type="text" id="full_name" placeholder="e.g. Alexander Pierce" required>
            </div>
            
            <div class="form-group">
              <label for="contact_number">Contact Number</label>
              <input type="tel" id="contact_number" placeholder="Mobile Number" required pattern="[0-9]{10}">
            </div>

            <div class="form-group">
              <label for="department_visiting">Department</label>
              <select id="department_visiting" required>
                <option value="">Select Department</option>
                <option value="HR">Human Resources</option>
                <option value="IT">ITMS</option>
                <option value="Finance">Finance</option>
                <option value="Production">Production</option>
                <option value="Engineering">Engineering</option>
              </select>
            </div>

            <div class="form-group">
              <label for="person_to_visit">Host Name</label>
              <input type="text" id="person_to_visit" placeholder="Person to Visit" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">
              <i data-lucide="user-plus"></i> Complete Registration
            </button>
          </form>
        </div>
        <div class="card" id="pass-section" style="display: none; grid-column: 1 / -1; text-align: center;">
          <h2>Registration Successful</h2>
          <div id="badge-display"></div>
          <button onclick="window.print()" class="btn btn-primary" style="margin-top: 20px;">
            <i data-lucide="printer"></i> Print Visitor Pass
          </button>
        </div>
      </section>
    </main>
  </div>
  
  <script src="script.js" defer></script>
  <script>
    // Initialize Lucide icons
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
    });
  </script>
</body>
</html>

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - BASE_URL=http://localhost:3000
      - MONGODB_URI=mongodb://mongodb:27017/visitor-management
    env_file:
      - backend/.env
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/backend/uploads

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SECURE — Admin Login</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="login-bg"></div>

  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4.18c2.76 0 5 2.24 5 5s-2.24 5-5 5-5-2.24-5-5 2.24-5 5-5z" opacity=".4"/><path d="M12 2.18l7 3.12v4.7c0 4.67-3.13 8.97-7 10.18-3.87-1.21-7-5.51-7-10.18V5.3l7-3.12z"/></svg>
    </div>
    <h1 class="login-title">SECURE VMS</h1>
    <p class="login-sub">Administrator access — enter your credentials</p>

    <div class="login-error" id="login-error">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="error-text">Invalid credentials. Try again.</span>
    </div>

    <form id="login-form" autocomplete="off">
      <div class="input-wrap">
        <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" class="form-control" placeholder="Enter admin password" autocomplete="current-password" required>
        <button type="button" class="toggle-pw" id="toggle-pw" tabindex="-1">
          <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn" style="margin-top:8px;">
        <span id="btn-content">Sign In</span>
      </button>
    </form>

    <div class="login-footer">
      <a href="/">← Back to Check-in</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const btn = document.getElementById('login-btn');
    const btnContent = document.getElementById('btn-content');
    const errorEl = document.getElementById('login-error');
    const errorText = document.getElementById('error-text');
    const togglePw = document.getElementById('toggle-pw');
    const pwInput = document.getElementById('password');

    togglePw.addEventListener('click', () => {
      const isText = pwInput.type === 'text';
      pwInput.type = isText ? 'password' : 'text';
      document.getElementById('eye-icon').innerHTML = isText
        ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = pwInput.value;
      if (!password) return;

      btn.disabled = true;
      btnContent.innerHTML = '<span class="spinner"></span> Authenticating…';
      errorEl.classList.remove('show');

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });

        if (res.ok) {
          const data = await res.json();
          sessionStorage.setItem('secure_auth', data.token);
          btnContent.innerHTML = '✓ Access Granted';
          btn.style.background = 'var(--green)';
          setTimeout(() => { window.location.href = '/dashboard.html'; }, 500);
        } else {
          throw new Error('Invalid credentials');
        }
      } catch (err) {
        errorText.textContent = 'Invalid password. Access denied.';
        errorEl.classList.add('show');
        pwInput.value = '';
        pwInput.focus();
        btn.disabled = false;
        btnContent.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>

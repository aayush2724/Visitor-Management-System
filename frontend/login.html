<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SENTINEL VMS — Secure Access</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Hanken+Grotesk:wght@600;700;800;900&family=Geist:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/sentinel.css"/>
<style>
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  body { background-color: #0d1515; color: #dce4e5; }
  .grid-bg {
    background-image: radial-gradient(rgba(0,240,255,0.06) 1px, transparent 0);
    background-size: 40px 40px;
  }
  @keyframes glow-pulse {
    0%,100% { opacity:.15; transform:scale(1); }
    50% { opacity:.3; transform:scale(1.05); }
  }
  .glow-orb { animation: glow-pulse 4s ease-in-out infinite; }
</style>
<script id="tailwind-config">
tailwind.config = {
  darkMode:"class",
  theme:{ extend:{
    colors:{
      "background":"#0d1515","surface":"#0d1515","surface-container-lowest":"#080f10",
      "surface-container-low":"#151d1e","surface-container":"#192122","surface-container-high":"#232b2c",
      "surface-container-highest":"#2e3637","surface-variant":"#2e3637",
      "on-surface":"#dce4e5","on-surface-variant":"#b9cacb","outline":"#849495","outline-variant":"#3b494b",
      "primary":"#dbfcff","primary-fixed":"#7df4ff","primary-fixed-dim":"#00dbe9","primary-container":"#00f0ff",
      "on-primary":"#00363a","on-primary-container":"#006970",
      "secondary":"#4edea3","secondary-fixed-dim":"#4edea3",
      "error":"#ffb4ab","error-container":"#93000a","on-error-container":"#ffdad6",
    },
    borderRadius:{"DEFAULT":"0.125rem","lg":"0.25rem","xl":"0.5rem","full":"0.75rem"},
    spacing:{"xs":"4px","xl":"64px","margin-desktop":"48px","sm":"12px","gutter":"24px","md":"24px","base":"8px","lg":"40px"},
    fontFamily:{"display-lg":["Hanken Grotesk"],"code-snippet":["Geist"],"label-sm":["Geist"],"body-base":["Inter"],"headline-md":["Hanken Grotesk"]},
    fontSize:{
      "display-lg":["48px",{lineHeight:"1.1",letterSpacing:"-0.02em",fontWeight:"700"}],
      "display-lg-mobile":["36px",{lineHeight:"1.2",fontWeight:"700"}],
      "label-sm":["12px",{lineHeight:"1",letterSpacing:"0.05em",fontWeight:"500"}],
      "body-base":["16px",{lineHeight:"1.6",fontWeight:"400"}],
      "headline-md":["24px",{lineHeight:"1.3",fontWeight:"600"}],
    }
  }}
}
</script>
</head>
<body class="font-body-base text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden grid-bg">

<!-- Glow orbs -->
<div class="glow-orb absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[600px] rounded-full pointer-events-none" style="background:radial-gradient(circle,rgba(0,240,255,.12) 0%,transparent 60%);"></div>
<div class="absolute bottom-0 right-0 w-[400px] h-[400px] rounded-full pointer-events-none" style="background:radial-gradient(circle,rgba(78,222,163,.06) 0%,transparent 60%);"></div>

<!-- Card -->
<div class="relative z-10 w-full max-w-[380px] mx-4">
  <!-- Header -->
  <div class="text-center mb-lg">
    <div class="w-16 h-16 rounded-2xl bg-primary-container/10 border border-primary-container/20 flex items-center justify-center mx-auto mb-md" style="box-shadow:0 0 32px rgba(0,240,255,.15);">
      <span class="material-symbols-outlined text-primary-container text-[32px]" style="font-variation-settings:'FILL' 1;">shield_lock</span>
    </div>
    <h1 class="font-display-lg text-display-lg-mobile text-primary tracking-tighter">SENTINEL VMS</h1>
    <p class="font-label-sm uppercase tracking-widest text-on-surface-variant opacity-60 mt-xs">Secure Terminal Access</p>
  </div>

  <!-- Login card -->
  <div class="glass-panel rounded-xl p-lg" style="box-shadow:0 16px 48px rgba(0,0,0,.5);">
    <div id="login-error" class="hidden items-center gap-sm p-sm bg-error/10 border border-error/25 rounded mb-md text-error font-label-sm">
      <span class="material-symbols-outlined text-[16px]">error</span>
      <span id="error-text">Invalid credentials. Access denied.</span>
    </div>

    <form id="login-form" autocomplete="off">
      <div class="mb-md">
        <label class="block font-label-sm uppercase tracking-widest text-on-surface-variant mb-sm">Access Code</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[18px] pointer-events-none">lock</span>
          <input id="password" type="password" required autocomplete="current-password"
            class="w-full bg-surface-container border border-outline-variant/30 rounded-lg py-md pl-[44px] pr-[44px] text-on-surface font-body-base text-sm focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container/20 transition-all"
            placeholder="Enter admin password"/>
          <button type="button" id="toggle-pw" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-all">
            <span class="material-symbols-outlined text-[18px]" id="eye-icon">visibility</span>
          </button>
        </div>
      </div>

      <button id="login-btn" type="submit" class="w-full py-md bg-primary-container text-on-primary-container font-headline-md uppercase tracking-tighter font-black rounded-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-sm glow-sm">
        <span class="material-symbols-outlined text-[18px]" style="font-variation-settings:'FILL' 1;">login</span>
        <span id="btn-content">Authenticate</span>
      </button>
    </form>

    <div class="mt-lg pt-md border-t border-outline-variant/10 flex items-center justify-between">
      <a href="/" class="flex items-center gap-xs text-on-surface-variant hover:text-primary transition-all font-label-sm">
        <span class="material-symbols-outlined text-[14px]">arrow_back</span>
        Visitor Check-In
      </a>
      <span class="font-code-snippet text-[10px] text-on-surface-variant opacity-40">v2.4.9-SECURE</span>
    </div>
  </div>

  <!-- Footer hint -->
  <p class="text-center text-[10px] text-on-surface-variant opacity-40 mt-md font-code-snippet uppercase tracking-widest">
    Unauthorized access is strictly prohibited
  </p>
</div>

<div class="toast-container" id="toasts"></div>
<script>
const form = document.getElementById('login-form');
const btn = document.getElementById('login-btn');
const btnContent = document.getElementById('btn-content');
const errorEl = document.getElementById('login-error');
const errorText = document.getElementById('error-text');
const togglePw = document.getElementById('toggle-pw');
const pwInput = document.getElementById('password');

togglePw.addEventListener('click', () => {
  const isText = pwInput.type === 'text';
  pwInput.type = isText ? 'password' : 'text';
  document.getElementById('eye-icon').textContent = isText ? 'visibility' : 'visibility_off';
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const password = pwInput.value;
  if (!password) return;

  btn.disabled = true;
  btnContent.innerHTML = '<span class="animate-spin inline-block w-4 h-4 border-2 border-on-primary-container/30 border-t-on-primary-container rounded-full mr-xs"></span> Authenticating...';
  errorEl.classList.add('hidden'); errorEl.classList.remove('flex');

  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password }),
    });
    if (res.ok) {
      const data = await res.json();
      sessionStorage.setItem('secure_auth', data.token);
      btnContent.innerHTML = '<span class="material-symbols-outlined text-[16px]" style="font-variation-settings:\'FILL\' 1;">verified</span> Access Granted';
      btn.style.background = '#4edea3';
      btn.style.color = '#003824';
      setTimeout(() => { window.location.href = '/dashboard.html'; }, 500);
    } else {
      throw new Error('Invalid credentials');
    }
  } catch (err) {
    errorText.textContent = 'Invalid password. Access denied.';
    errorEl.classList.remove('hidden'); errorEl.classList.add('flex');
    pwInput.value = ''; pwInput.focus();
    btn.disabled = false;
    btnContent.innerHTML = '<span class="material-symbols-outlined text-[18px]" style="font-variation-settings:\'FILL\' 1;">login</span> Authenticate';
    btn.style.background = '';
  }
});
</script>
</body>
</html>

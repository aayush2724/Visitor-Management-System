<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CheckMate — Visitor Badge</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Hanken+Grotesk:wght@600;700;800;900&family=Geist:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  body { background-color: #0d1515; color: #dce4e5; }
  @media print {
    body { background: white; }
    .no-print { display: none !important; }
    .badge-card { box-shadow: none !important; }
  }
</style>
<script id="tailwind-config">
tailwind.config = {
  darkMode:"class",
  theme:{ extend:{
    colors:{
      "background":"#0d1515","surface":"#0d1515","surface-container-lowest":"#080f10",
      "surface-container-low":"#151d1e","surface-container":"#192122","surface-container-high":"#232b2c",
      "surface-container-highest":"#2e3637",
      "on-surface":"#dce4e5","on-surface-variant":"#b9cacb","outline":"#849495","outline-variant":"#3b494b",
      "primary":"#dbfcff","primary-fixed-dim":"#00dbe9","primary-container":"#00f0ff","on-primary-container":"#006970",
      "secondary":"#4edea3","secondary-fixed-dim":"#4edea3","on-secondary":"#003824",
      "error":"#ffb4ab","error-container":"#93000a",
    },
    borderRadius:{"DEFAULT":"0.125rem","lg":"0.25rem","xl":"0.5rem","full":"0.75rem"},
    spacing:{"xs":"4px","xl":"64px","sm":"12px","gutter":"24px","md":"24px","base":"8px","lg":"40px"},
    fontFamily:{"display-lg":["Hanken Grotesk"],"code-snippet":["Geist"],"label-sm":["Geist"],"body-base":["Inter"],"headline-md":["Hanken Grotesk"]},
    fontSize:{
      "label-sm":["12px",{lineHeight:"1",letterSpacing:"0.05em",fontWeight:"500"}],
      "body-base":["16px",{lineHeight:"1.6",fontWeight:"400"}],
      "headline-md":["24px",{lineHeight:"1.3",fontWeight:"600"}],
    }
  }}
}
</script>
</head>
<body class="font-body-base text-on-surface min-h-screen flex flex-col items-center py-lg px-md" style="background:#0d1515;">

<!-- Controls -->
<div class="no-print flex items-center gap-md mb-lg">
  <button onclick="history.back()" class="flex items-center gap-xs px-md py-sm border border-outline-variant/30 text-on-surface-variant rounded hover:text-primary hover:border-primary transition-all font-label-sm">
    <span class="material-symbols-outlined text-[16px]">arrow_back</span> Back
  </button>
  <h1 class="font-display-lg text-headline-md text-primary font-black tracking-tighter">CheckMate</h1>
  <button onclick="window.print()" class="flex items-center gap-xs px-md py-sm bg-primary-container text-on-primary-container rounded font-label-sm hover:brightness-110 transition-all">
    <span class="material-symbols-outlined text-[16px]">print</span> Print Badge
  </button>
</div>

<p id="loading" class="text-on-surface-variant font-code-snippet text-[11px] uppercase tracking-widest">Loading visitor record...</p>
<p id="error-msg" class="text-error font-code-snippet text-[11px] uppercase tracking-widest" style="display:none;">Visitor not found or badge expired.</p>

<!-- Badge card -->
<div class="badge-card bg-white rounded-2xl overflow-hidden shadow-2xl" id="badge-card" style="display:none;width:360px;">
  <!-- Header -->
  <div class="p-lg flex items-center justify-between" style="background:linear-gradient(135deg,#004f54 0%,#006970 50%,#00363a 100%);">
    <div>
      <div class="font-display-lg font-black text-lg tracking-tighter text-white">CheckMate</div>
      <div class="text-[10px] text-white/70 font-code-snippet uppercase tracking-widest mt-[2px]">Visitor Management System</div>
    </div>
    <div class="bg-white/15 text-white px-sm py-xs rounded font-label-sm uppercase tracking-widest text-[10px] border border-white/20" id="b-type">Guest</div>
  </div>

  <!-- Body -->
  <div class="p-lg bg-white">
    <div class="flex gap-md mb-md">
      <div id="b-photo-wrap" class="flex-shrink-0"></div>
      <div>
        <div class="font-display-lg font-black text-xl text-slate-900 leading-tight" id="b-name">—</div>
        <div class="font-code-snippet text-[11px] text-indigo-600 font-medium mt-[3px]" id="b-badge">—</div>
        <div class="text-slate-500 text-[12px] mt-[3px]" id="b-dept">—</div>
      </div>
    </div>

    <div class="h-px bg-slate-200 my-md"></div>

    <div class="grid grid-cols-2 gap-x-lg gap-y-sm mb-md">
      <div>
        <div class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-[2px] font-code-snippet">Host</div>
        <div class="text-[12px] font-semibold text-slate-800" id="b-host">—</div>
      </div>
      <div>
        <div class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-[2px] font-code-snippet">Purpose</div>
        <div class="text-[12px] font-semibold text-slate-800" id="b-purpose">—</div>
      </div>
      <div>
        <div class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-[2px] font-code-snippet">Check-In</div>
        <div class="text-[12px] font-semibold text-slate-800" id="b-checkin">—</div>
      </div>
      <div>
        <div class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-[2px] font-code-snippet">Duration</div>
        <div class="text-[12px] font-semibold text-slate-800" id="b-duration">—</div>
      </div>
    </div>

    <div class="h-px bg-slate-200 my-md"></div>

    <div class="flex gap-md items-center">
      <img id="b-qr" class="w-20 h-20 rounded-lg border border-slate-200 p-[3px] bg-white flex-shrink-0" style="display:none;" alt="QR"/>
      <div id="b-qr-ph" class="w-20 h-20 rounded-lg border-2 border-dashed border-slate-200 flex items-center justify-center text-[9px] text-slate-400 text-center font-code-snippet flex-shrink-0">QR N/A</div>
      <div>
        <div class="font-bold text-[11px] text-slate-800 mb-[3px]">Scan at exit gate</div>
        <div class="text-[10px] text-slate-500 leading-relaxed">Present badge to security. QR code enables quick checkout verification.</div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="px-lg py-sm bg-slate-50 border-t border-slate-200 flex items-center justify-between">
    <div class="text-[9px] text-slate-400 font-code-snippet" id="b-time">—</div>
    <div class="flex items-center gap-[5px] text-[9px] font-bold text-emerald-600 font-code-snippet">
      <div class="w-[6px] h-[6px] rounded-full bg-emerald-500"></div>
      AUTHORIZED
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
if (!id) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-msg').style.display = 'block';
} else {
  fetch(`/api/visitors/${id}`)
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(v => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('badge-card').style.display = 'block';

      document.getElementById('b-name').textContent = v.full_name;
      document.getElementById('b-badge').textContent = v.badge_number || 'N/A';
      document.getElementById('b-dept').textContent = v.department_visiting || '—';
      document.getElementById('b-host').textContent = v.person_to_visit || '—';
      document.getElementById('b-purpose').textContent = v.purpose_of_visit || 'General';
      document.getElementById('b-duration').textContent = v.expected_duration || '—';
      document.getElementById('b-type').textContent = v.visitor_type || 'Guest';

      const inTime = new Date(v.in_time);
      document.getElementById('b-checkin').textContent = inTime.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      document.getElementById('b-time').textContent = inTime.toLocaleDateString('en-US',{weekday:'short',year:'numeric',month:'short',day:'numeric'}) + ' · ' + inTime.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

      const photoWrap = document.getElementById('b-photo-wrap');
      if (v.photo_path) {
        photoWrap.innerHTML = `<img src="${v.photo_path}" class="w-16 h-16 rounded-xl object-cover border border-slate-200" alt="Photo">`;
      } else {
        const initials = v.full_name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
        photoWrap.innerHTML = `<div class="w-16 h-16 rounded-xl flex items-center justify-center font-black text-2xl text-white" style="background:linear-gradient(135deg,#004f54,#006970);">${initials}</div>`;
      }
      if (v.qr_code_path) {
        const qr = document.getElementById('b-qr');
        qr.src = v.qr_code_path; qr.style.display = 'block';
        document.getElementById('b-qr-ph').style.display = 'none';
      }
    })
    .catch(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').style.display = 'block';
    });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSB | Command Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <nav class="topbar">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 2.18l7 3.12v4.7c0 4.67-3.13 8.97-7 10.18-3.87-1.21-7-5.51-7-10.18V6.3l7-3.12zm0 2.82c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 2c1.65 0 3 1.35 3 3s-1.35 3-3 3-3-1.35-3-3 1.35-3 3-3z"/></svg>
      </div>
      <div class="brand-text">
        <span class="brand-title">RSB</span>
        <span class="brand-sub">Visitor Mgmt</span>
      </div>
    </div>

    <div class="nav-pills">
      <a href="/" class="nav-pill">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
        Registration
      </a>
      <a href="/dashboard.html" class="nav-pill active">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
        Intelligence
      </a>
      <a href="/schedule.html" class="nav-pill">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></svg>
        Schedule
      </a>
    </div>

    <div class="system-status">
      <div class="status-text">
        <span class="status-title">System Active</span>
        <span class="status-sub"><div class="status-dot"></div> Network Secure</span>
      </div>
      <button class="logout-btn-new" onclick="logout()" title="Secure Logout">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
      </button>
    </div>
  </nav>

  <div class="content">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card pulsing">
        <div class="stat-label">TOTAL REGISTRY</div>
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-accent" style="background:var(--green);opacity:0.4;"></div>
      </div>
      <div class="stat-card pulsing">
        <div class="stat-label">ON-SITE NOW</div>
        <div class="stat-value" id="stat-active">0</div>
        <div class="stat-accent" style="background:var(--green);"></div>
      </div>
      <div class="stat-card pulsing">
        <div class="stat-label">TOTAL RELEASED</div>
        <div class="stat-value" id="stat-released" style="color:var(--blue)">0</div>
        <div class="stat-accent" style="background:var(--blue);"></div>
      </div>
      <div class="stat-card pulsing">
        <div class="stat-label">PRE-SCHEDULED</div>
        <div class="stat-value" id="stat-scheduled" style="color:var(--purple)">0</div>
        <div class="stat-accent" style="background:var(--purple);"></div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">&#9906;</span>
        <input type="text" id="search-input" placeholder="SEARCH VISITOR NAME...">
      </div>
      <button class="export-btn" onclick="downloadExcel('day')">&#8659; Daily Log</button>
      <button class="export-btn" onclick="downloadExcel('week')">&#8659; Weekly</button>
      <button class="export-btn" onclick="downloadExcel('month')">&#8659; Monthly</button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" data-status="all">ALL RECORDS</div>
      <div class="tab" data-status="active">ON-SITE</div>
      <div class="tab" data-status="released">COMPLETED</div>
      <div class="tab" data-status="security-pending">PENDING EXIT</div>
      <div class="tab" data-status="scheduled">SCHEDULED</div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Visitor</th>
            <th>Contact</th>
            <th>Dept / Host</th>
            <th>Timeline</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="visitor-tbody"></tbody>
      </table>
    </div>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>

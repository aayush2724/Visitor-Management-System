<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSB | Secure Check-In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>
    <nav class="topbar">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 2.18l7 3.12v4.7c0 4.67-3.13 8.97-7 10.18-3.87-1.21-7-5.51-7-10.18V6.3l7-3.12zm0 2.82c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 2c1.65 0 3 1.35 3 3s-1.35 3-3 3-3-1.35-3-3 1.35-3 3-3z"
            />
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-title">RSB</span>
          <span class="brand-sub">Visitor Mgmt</span>
        </div>
      </div>

      <div class="nav-pills">
        <a href="/" class="nav-pill active">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
          </svg>
          Registration
        </a>
        <a href="/dashboard.html" class="nav-pill">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
          </svg>
          Intelligence
        </a>
        <a href="/schedule.html" class="nav-pill">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
          Schedule
        </a>
      </div>

      <div class="system-status">
        <div class="status-text">
          <span class="status-title">System Active</span>
          <span class="status-sub"
            ><div class="status-dot"></div>
            Network Secure</span
          >
        </div>
        <div class="logout-btn" onclick="window.location.href = '/login.html'">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </div>
      </div>
    </nav>

    <div class="hero">
      <h1>SECURE CHECK-IN</h1>
      <p>
        Initiate identity capture and registration protocol for un-scheduled
        facility visitors.
      </p>
    </div>

    <div class="container">
      <div class="card">
        <div class="card-header">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"
            />
            <circle cx="12" cy="13" r="4" />
          </svg>
          BIOMETRIC CAPTURE
        </div>

        <div class="cam-box" id="cam-frame">
          <div class="cam-offline" id="cam-placeholder">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            <span style="font-weight: 500">Camera offline</span>
          </div>
          <video id="video" autoplay playsinline muted></video>
          <canvas id="canvas"></canvas>
        </div>

        <button class="init-cam-btn" id="capture-btn" type="button">
          Initiate Capture Protocol
        </button>
        <p
          id="photo-status"
          style="
            text-align: center;
            font-size: 0.8rem;
            color: var(--accent);
            margin-top: 10px;
          "
        ></p>
      </div>

      <div class="card">
        <div class="card-header">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
            <line x1="20" y1="8" x2="20" y2="14" />
            <line x1="23" y1="11" x2="17" y2="11" />
          </svg>
          VISITOR PARTICULARS
        </div>

        <form id="visitor-form">
          <div class="form-grid">
            <div class="form-group">
              <label>Full Name</label>
              <input
                type="text"
                id="full_name"
                placeholder="ALEXANDER PIERCE"
                required
              />
            </div>
            <div class="form-group">
              <label>Contact Number</label>
              <input
                type="tel"
                id="contact_number"
                placeholder="+91 98765 43210"
                required
                title="Enter mobile number with country code"
              />
            </div>
            <div class="form-group">
              <label>Department</label>
              <select id="department_visiting" required>
                <option value="">Select Protocol</option>
                <option value="HR">Human Resources</option>
                <option value="IT">ITMS Operations</option>
                <option value="Finance">Finance Division</option>
                <option value="Engineering">Engineering & Dev</option>
                <option value="Security">Security Access</option>
              </select>
            </div>
            <div class="form-group">
              <label>Host Name</label>
              <input
                type="text"
                id="person_to_visit"
                placeholder="DR. SARAH CHEN"
                required
              />
            </div>
          </div>

          <input type="hidden" id="purpose_of_visit" value="Facility Access" />
          <input type="hidden" id="captured_photo" name="captured_photo" />

          <button type="submit" class="auth-btn" id="submit-btn">
            Authorize Entry
          </button>
        </form>
      </div>
    </div>

    <div id="pass-section">
      <div class="pass-card">
        <h2>&#10003; ENTRY AUTHORIZED</h2>
        <p style="color: var(--text-muted); margin-bottom: 20px">
          Identity logged and host notified.
        </p>
        <img
          id="pass-qr"
          src=""
          alt="QR Code"
          style="
            width: 150px;
            height: 150px;
            border-radius: 8px;
            border: 2px solid var(--accent);
            padding: 4px;
            display: none;
            margin: 0 auto 20px;
          "
        />
        <button
          class="init-cam-btn"
          onclick="window.location.reload()"
          style="border-color: var(--accent); color: var(--accent)"
        >
          Close Terminal
        </button>
      </div>
    </div>

    <script src="js/index.js"></script>
  </body>
</html>

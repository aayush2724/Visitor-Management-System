<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSB | Pre-Schedule Visit</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07090e; --bg-panel: #0d121c; --bg-card: #151b2b;
      --border: #1e293b; --green: #00e5ff; --green-dim: #00b8cc;
      --green-glow: rgba(0,229,255,0.25); --text: #ffffff;
      --text-muted: #8b9bb4; --text-label: #00e5ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); font-family: 'Rajdhani', sans-serif;
      color: var(--text); min-height: 100vh;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,255,0.012) 2px, rgba(0,229,255,0.012) 4px);
    }

    /* TOP NAVIGATION */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
      background: rgba(7, 9, 14, 0.95);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0; z-index: 100;
      backdrop-filter: blur(10px);
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon {
      width: 40px; height: 40px; border-radius: 8px;
      border: 1px solid rgba(0, 229, 255, 0.3);
      display: flex; align-items: center; justify-content: center;
      background: rgba(0, 229, 255, 0.05); color: var(--green);
    }
    .brand-icon svg { width: 20px; height: 20px; fill: currentColor; }
    .brand-text { display: flex; flex-direction: column; }
    .brand-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.1rem; letter-spacing: 1px; color: var(--text); line-height: 1; }
    .brand-sub { font-size: 0.75rem; color: var(--green); font-family: 'Share Tech Mono', monospace; margin-top: 4px; }

    .nav-pills {
      display: flex; background: #0f1523; border-radius: 12px; padding: 4px; border: 1px solid var(--border);
    }
    .nav-pill {
      padding: 8px 24px; border-radius: 8px; color: var(--text-muted); font-size: 0.85rem; font-family: 'Rajdhani', sans-serif; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 8px; transition: all 0.2s;
    }
    .nav-pill:hover { color: var(--text); }
    .nav-pill.active { background: rgba(0, 229, 255, 0.1); color: var(--green); border: 1px solid rgba(0, 229, 255, 0.2); }
    .nav-pill svg { width: 16px; height: 16px; opacity: 0.8; }

    .system-status { display: flex; align-items: center; gap: 16px; }
    .status-text { display: flex; flex-direction: column; align-items: flex-end; }
    .status-title { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 0.85rem; color: var(--text); }
    .status-sub { display: flex; align-items: center; gap: 6px; font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: #10b981; }
    .status-dot { width: 6px; height: 6px; background: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; }

    /* PAGE */
    .page { display: flex; align-items: flex-start; justify-content: center; padding: 60px 24px; }

    .form-card {
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: 6px; padding: 48px; width: 100%; max-width: 560px;
      box-shadow: 0 0 40px rgba(0,255,136,0.04);
    }

    .form-title {
      font-family: 'Orbitron', monospace; font-size: 1.2rem; font-weight: 800;
      letter-spacing: 2px; margin-bottom: 6px;
    }
    .form-title span { color: var(--green); }
    .form-sub {
      font-family: 'Share Tech Mono', monospace; font-size: 0.7rem;
      color: var(--text-muted); letter-spacing: 2px; margin-bottom: 36px;
    }

    .form-group { margin-bottom: 20px; }
    label {
      font-family: 'Share Tech Mono', monospace; font-size: 0.65rem;
      color: var(--text-label); letter-spacing: 3px; display: block; margin-bottom: 7px;
    }
    input, select {
      width: 100%; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 4px; padding: 13px 16px; color: var(--text);
      font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 500;
      outline: none; transition: all 0.2s;
    }
    input:focus, select:focus {
      border-color: var(--green); box-shadow: 0 0 0 1px rgba(0,255,136,0.2);
    }
    input::placeholder { color: var(--text-muted); font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; }
    select option { background: var(--bg-card); }

    /* Date/time row */
    .date-time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    input[type="date"], input[type="time"] { color-scheme: dark; }

    .submit-btn {
      width: 100%; margin-top: 28px; padding: 16px;
      background: transparent; border: 1px solid var(--green); border-radius: 4px;
      color: var(--green); font-family: 'Orbitron', monospace; font-size: 0.8rem;
      font-weight: 600; letter-spacing: 3px; cursor: pointer;
      position: relative; overflow: hidden; transition: all 0.2s;
    }
    .submit-btn::before {
      content: ''; position: absolute; inset: 0; background: var(--green);
      transform: scaleX(0); transform-origin: left; transition: transform 0.3s ease; z-index: 0;
    }
    .submit-btn:hover::before { transform: scaleX(1); }
    .submit-btn:hover { color: #000; box-shadow: 0 0 30px var(--green-glow); }
    .submit-btn span { position: relative; z-index: 1; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Success */
    .success-card {
      display: none; margin-top: 24px; padding: 24px;
      background: rgba(0,255,136,0.04); border: 1px solid rgba(0,255,136,0.2);
      border-radius: 4px; text-align: center;
    }
    .success-title { font-family: 'Orbitron', monospace; font-size: 0.9rem; color: var(--green); letter-spacing: 2px; margin-bottom: 8px; }
    .success-msg { font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: var(--text-muted); letter-spacing: 1px; }

    @media (max-width: 600px) {
      .form-card { padding: 28px 20px; }
      .date-time-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="topbar">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 2.18l7 3.12v4.7c0 4.67-3.13 8.97-7 10.18-3.87-1.21-7-5.51-7-10.18V6.3l7-3.12zm0 2.82c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 2c1.65 0 3 1.35 3 3s-1.35 3-3 3-3-1.35-3-3 1.35-3 3-3z"/></svg>
      </div>
      <div class="brand-text">
        <span class="brand-title">RSB</span>
        <span class="brand-sub">Visitor Mgmt</span>
      </div>
    </div>

    <div class="nav-pills">
      <a href="/" class="nav-pill">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
        Registration
      </a>
      <a href="/schedule.html" class="nav-pill active">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></svg>
        Schedule
      </a>
      <a href="/login.html" class="nav-pill">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
        Admin
      </a>
    </div>

    <div class="system-status">
      <div class="status-text">
        <span class="status-title">System Active</span>
        <span class="status-sub"><div class="status-dot"></div> Network Secure</span>
      </div>
    </div>
  </nav>

  <div class="page">
    <div class="form-card">
      <h2 class="form-title">PRE-SCHEDULE <span>VISIT</span></h2>
      <p class="form-sub">> Book your visit in advance for seamless entry authorization.</p>

      <form id="schedule-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="full_name" placeholder="FULL NAME" required>
        </div>

        <div class="form-group">
          <label>Contact Number</label>
          <input type="tel" id="contact_number" placeholder="10-DIGIT MOBILE NUMBER" required pattern="[0-9]{10}" title="Enter 10-digit mobile number">
        </div>

        <div class="form-group">
          <label>Department Visiting</label>
          <select id="department_visiting" required>
            <option value="">SELECT DEPARTMENT</option>
            <option value="HR">Human Resources</option>
            <option value="IT">ITMS</option>
            <option value="Finance">Finance</option>
            <option value="Production">Production</option>
            <option value="Quality">Quality</option>
            <option value="Purchase">Purchase</option>
            <option value="Engineering">Engineering &amp; Development</option>
            <option value="Business">Business Development</option>
            <option value="Sales">Sales</option>
          </select>
        </div>

        <div class="form-group">
          <label>Person to Visit</label>
          <input type="text" id="person_to_visit" placeholder="HOST NAME" required>
        </div>

        <div class="form-group">
          <label>Scheduled Date &amp; Time</label>
          <div class="date-time-row">
            <input type="date" id="scheduled_date" required>
            <input type="time" id="scheduled_time">
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">
          <span>&#9670; CONFIRM SCHEDULE</span>
        </button>
      </form>

      <div class="success-card" id="success-card">
        <div class="success-title">&#10003; VISIT SCHEDULED</div>
        <div class="success-msg" id="success-msg"></div>
      </div>
    </div>
  </div>

  <script>
    // Set min date to today
    document.getElementById('scheduled_date').min = new Date().toISOString().split('T')[0];

    document.getElementById('schedule-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.querySelector('span').textContent = '⧗ SCHEDULING...';

      const dateVal = document.getElementById('scheduled_date').value;
      const timeVal = document.getElementById('scheduled_time').value;
      const scheduled_date = timeVal ? `${dateVal}T${timeVal}` : dateVal;

      const data = {
        full_name: document.getElementById('full_name').value.trim(),
        contact_number: document.getElementById('contact_number').value.trim(),
        department_visiting: document.getElementById('department_visiting').value,
        person_to_visit: document.getElementById('person_to_visit').value.trim(),
        scheduled_date
      };

      try {
        const res = await fetch('/api/schedule', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error || 'Scheduling failed');

        const card = document.getElementById('success-card');
        document.getElementById('success-msg').textContent =
          `${data.full_name} · ${document.getElementById('department_visiting').options[document.getElementById('department_visiting').selectedIndex].text} · ${new Date(scheduled_date).toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'})}`;
        card.style.display = 'block';
        e.target.reset();
        document.getElementById('scheduled_date').min = new Date().toISOString().split('T')[0];
      } catch (err) {
        alert('Error: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.querySelector('span').textContent = '◆ CONFIRM SCHEDULE';
      }
    });
  </script>
</body>
</html>
